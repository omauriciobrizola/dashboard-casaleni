# Docker Compose para o Dashboard Casa Lení
# Roda o dashboard na mesma rede do PostgreSQL existente

services:
  dashboard:
    build: .
    container_name: dashboard-casaleni
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    networks:
      - postgres_default

networks:
  postgres_default:
    external: true
